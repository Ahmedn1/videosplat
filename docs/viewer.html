<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive viewer — videosplat</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#000;overflow:hidden;font-family:system-ui,sans-serif}
  #bar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;
       align-items:center;padding:12px 18px;z-index:10;pointer-events:none}
  #title{color:#fff;font-size:.95rem;font-weight:600;background:rgba(0,0,0,.45);
         backdrop-filter:blur(6px);padding:6px 14px;border-radius:8px}
  #back{pointer-events:auto;color:#fff;text-decoration:none;font-size:.8rem;
        background:rgba(0,0,0,.45);backdrop-filter:blur(6px);padding:7px 13px;border-radius:8px}
  #back:hover{background:rgba(249,115,22,.85)}
  #hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;color:rgba(255,255,255,.45);
        font-size:.72rem;z-index:10}
  #loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
           justify-content:center;background:#0a0a0a;color:#bbb;gap:14px;z-index:20}
  #bar2{width:240px;height:4px;background:#222;border-radius:2px;overflow:hidden}
  #fill{height:100%;width:10%;background:#f97316;transition:width .2s}
  .note{font-size:.72rem;color:#666;max-width:340px;text-align:center;line-height:1.5}
</style>
</head>
<body>
<div id="loading"><h2 id="lt" style="font-weight:400">Loading…</h2>
  <div id="bar2"><div id="fill"></div></div>
  <div class="note">Single-frame interactive splat (SH0). The full 4D playback runs locally — see the README.</div>
</div>
<div id="bar"><span id="title">videosplat</span><a id="back" href="index.html">← gallery</a></div>
<div id="hint">drag to orbit · scroll to zoom · right-drag to pan</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<script type="module">
import * as GaussianSplats3D from 'https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js';

(async () => {
  const id = new URLSearchParams(location.search).get('scene');
  const scenes = await fetch('scenes.json').then(r => r.json());
  const s = scenes.find(x => x.id === id) || scenes[0];
  document.getElementById('title').textContent = s.title;
  document.title = s.title + ' — videosplat';
  if (!s.splat) { document.getElementById('lt').textContent = 'No splat for this scene.'; return; }
  document.getElementById('fill').style.width = '45%';

  // framing: prefer an actual training camera; else derive from center+radius
  let camPos = s.cam_pos, camLookAt = s.cam_lookat || s.center;
  if (!camPos && s.center) {
    const c = s.center, r = s.radius || 3.0;
    camPos = [c[0], c[1] - r * 0.3, c[2] - r * 2.2];   // Y-down: -Y is up
    camLookAt = c;
  }
  const opts = {
    cameraUp: [0, -1, 0], selfDrivenMode: true, useBuiltInControls: true,
    renderMode: GaussianSplats3D.RenderMode.Always,
  };
  if (camPos) opts.initialCameraPosition = camPos;
  if (camLookAt) opts.initialCameraLookAt = camLookAt;

  const viewer = new GaussianSplats3D.Viewer(opts);
  await viewer.addSplatScene(s.splat, { splatAlphaRemovalThreshold: 5, showLoadingUI: false });
  document.getElementById('fill').style.width = '100%';
  setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 150);
  viewer.start();
})().catch(e => { document.getElementById('lt').textContent = 'Failed to load: ' + e.message; });
</script>
</body>
</html>
